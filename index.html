<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Interactive Quiz Game</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="quiz-container" role="main" aria-label="Interactive Quiz Game">

            <div class="quiz-header">
                <div class="quiz-title">
                    🧠 Quiz
                    <span>Timed</span>
                </div>
                <div class="score-badge">
                    🏆 Score <strong id="scoreDisplay">0</strong>
                </div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-meta">
                    <span id="questionCounter">Question 1 / 10</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%;"></div>
                </div>
            </div>

            <div class="question-screen" id="questionScreen">

                <div class="timer-section">
                    <span class="timer-label">⏱ Time</span>
                    <div class="timer-circle">
                        <span class="timer-display" id="timerDisplay">15</span>
                        <div class="timer-bar">
                            <div class="timer-bar-fill" id="timerBarFill" style="width:100%;"></div>
                        </div>
                    </div>
                </div>

                <div class="question-text" id="questionText">
                    Loading question…
                </div>

                <div class="options-grid" id="optionsContainer">
                    <!-- options injected by JS -->
                </div>

                <div class="next-btn-wrapper">
                    <button class="next-btn" id="nextBtn" disabled>
                        Next <span style="font-size:18px;">→</span>
                    </button>
                </div>
            </div>

            <div class="result-screen" id="resultScreen">
                <div class="result-icon" id="resultIcon">🎉</div>
                <div class="result-title" id="resultTitle">Great Job!</div>
                <div class="result-subtitle" id="resultSubtitle">
                    You've completed the quiz. Here's how you performed.
                </div>
                <div class="result-score-box">
                    <span class="big-score" id="finalScore">0</span>
                    <span class="out-of"> / <span id="totalQuestions">10</span></span>
                </div>
                <div class="result-stats">
                    <div class="result-stat">
                        <span class="stat-number green" id="correctCount">0</span>
                        <span class="stat-label">✅ Correct</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-number red" id="wrongCount">0</span>
                        <span class="stat-label">❌ Wrong</span>
                    </div>
                    <div class="result-stat">
                        <span class="stat-number gold" id="accuracyDisplay">0%</span>
                        <span class="stat-label">🎯 Accuracy</span>
                    </div>
                </div>
                <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
            </div>

        </div>
        <script src="script.js"></script>
    </body>

</html>
